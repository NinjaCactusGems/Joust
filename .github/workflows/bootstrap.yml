name: Bootstrap Cloudflare

# One-time setup workflow. Idempotent — re-running is a no-op once both
# the Pages project and the custom domain exist. Safe to delete this file
# after a successful run, but harmless to leave in place.
#
# What it does:
#   1. Creates the `joust` Cloudflare Pages project with main as the
#      production branch (if it doesn't already exist).
#   2. Attaches joust.ninja-cactus.com as a custom domain on that project
#      (if not already attached).
#   3. Creates the CNAME record joust.ninja-cactus.com -> joust.pages.dev
#      in the ninja-cactus.com zone. This step is required: only the
#      Cloudflare dashboard's add-domain flow creates DNS automatically;
#      the API endpoint used in step 2 does not.
#
# Required API token scopes (CLOUDFLARE_API_KEY):
#   - Account → Cloudflare Pages → Edit
#   - Account → Account Settings → Read
#   - Zone → DNS → Edit (for ninja-cactus.com)
# If any is missing, the workflow will fail with a clear error.

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Create Pages project and attach custom domain
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT: joust
          DOMAIN: joust.ninja-cactus.com
          PRODUCTION_BRANCH: main
        run: |
          set -eo pipefail

          # Sanity-check that the org secrets reached this workflow.
          # An empty value here usually means the repo isn't included in
          # the organisation secret's repository access list.
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::CLOUDFLARE_API_KEY secret is empty in this workflow. Check the org secret's repository access policy and confirm this repo is allowed."
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID secret is empty in this workflow. Check the org secret's repository access policy and confirm this repo is allowed."
            exit 1
          fi

          # api METHOD PATH [JSON_BODY]
          # Prints the HTTP status code on stdout (so callers can capture
          # it with $(api ...)). Writes the response body to RESPONSE_FILE,
          # which the caller reads via `cat`. Two channels because a
          # function called as $(api ...) runs in a subshell and can't
          # mutate the parent's variables — hence the file for the body.
          RESPONSE_FILE=$(mktemp)
          trap 'rm -f "$RESPONSE_FILE"' EXIT

          api() {
            local method=$1 path=$2 data=${3:-}
            if [ -n "$data" ]; then
              curl -sS -o "$RESPONSE_FILE" -w '%{http_code}' \
                -X "$method" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "$data" \
                "https://api.cloudflare.com/client/v4$path"
            else
              curl -sS -o "$RESPONSE_FILE" -w '%{http_code}' \
                -X "$method" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                "https://api.cloudflare.com/client/v4$path"
            fi
          }

          die() {
            local context=$1 status=$2
            echo "::error::$context (HTTP $status)"
            echo "--- Cloudflare response ---"
            jq . "$RESPONSE_FILE" 2>/dev/null || cat "$RESPONSE_FILE"
            echo "---------------------------"
            exit 1
          }

          echo "::group::Verify API token"
          STATUS=$(api GET /user/tokens/verify)
          if [ "$STATUS" != "200" ] || [ "$(jq -r '.result.status // empty' "$RESPONSE_FILE")" != "active" ]; then
            die "API token verification failed — token is missing, invalid, or lacks the minimum scopes." "$STATUS"
          fi
          echo "Token is active."
          echo "::endgroup::"

          echo "::group::Step 1 — Pages project ($PROJECT)"
          STATUS=$(api GET "/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PROJECT")
          case "$STATUS" in
            200)
              CURRENT_BRANCH=$(jq -r '.result.production_branch // empty' "$RESPONSE_FILE")
              echo "Project '$PROJECT' already exists (production_branch=$CURRENT_BRANCH). Skipping creation."
              if [ -n "$CURRENT_BRANCH" ] && [ "$CURRENT_BRANCH" != "$PRODUCTION_BRANCH" ]; then
                echo "::warning::Existing project's production branch is '$CURRENT_BRANCH', expected '$PRODUCTION_BRANCH'. Fix in the Cloudflare dashboard if previews/prod end up swapped."
              fi
              ;;
            404)
              echo "Project does not exist. Creating..."
              STATUS=$(api POST "/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects" \
                "{\"name\":\"$PROJECT\",\"production_branch\":\"$PRODUCTION_BRANCH\"}")
              if [ "$STATUS" != "200" ] || [ "$(jq -r '.success // false' "$RESPONSE_FILE")" != "true" ]; then
                die "Failed to create Pages project '$PROJECT'. The token likely lacks the 'Cloudflare Pages: Edit' scope." "$STATUS"
              fi
              echo "Created project '$PROJECT' with production_branch=$PRODUCTION_BRANCH."
              ;;
            *)
              die "Unexpected status when checking project '$PROJECT'." "$STATUS"
              ;;
          esac
          echo "::endgroup::"

          echo "::group::Step 2 — Custom domain ($DOMAIN)"
          STATUS=$(api GET "/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PROJECT/domains")
          if [ "$STATUS" != "200" ]; then
            die "Failed to list domains for project '$PROJECT'." "$STATUS"
          fi

          if jq -e --arg d "$DOMAIN" '.result[] | select(.name == $d)' "$RESPONSE_FILE" >/dev/null; then
            echo "Custom domain '$DOMAIN' already attached. Skipping."
          else
            echo "Attaching '$DOMAIN'..."
            STATUS=$(api POST "/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PROJECT/domains" \
              "{\"name\":\"$DOMAIN\"}")
            if [ "$STATUS" != "200" ] || [ "$(jq -r '.success // false' "$RESPONSE_FILE")" != "true" ]; then
              die "Failed to attach custom domain '$DOMAIN' to project '$PROJECT'." "$STATUS"
            fi
            echo "Attached '$DOMAIN' to Pages project. DNS still needed (next step)."
          fi
          echo "::endgroup::"

          echo "::group::Step 3 — DNS record ($DOMAIN -> $PROJECT.pages.dev)"
          # Derive the zone name from the domain. $DOMAIN is a single
          # subdomain of the zone (joust.ninja-cactus.com -> ninja-cactus.com).
          ZONE_NAME=${DOMAIN#*.}
          TARGET="$PROJECT.pages.dev"

          STATUS=$(api GET "/zones?name=$ZONE_NAME")
          if [ "$STATUS" != "200" ]; then
            die "Failed to list zones." "$STATUS"
          fi
          ZONE_ID=$(jq -r '.result[0].id // empty' "$RESPONSE_FILE")
          if [ -z "$ZONE_ID" ]; then
            die "Zone '$ZONE_NAME' not found in this Cloudflare account, or the token lacks 'Zone:Read' for it." "$STATUS"
          fi
          echo "Found zone '$ZONE_NAME' (id=$ZONE_ID)."

          STATUS=$(api GET "/zones/$ZONE_ID/dns_records?type=CNAME&name=$DOMAIN")
          if [ "$STATUS" != "200" ]; then
            die "Failed to list DNS records for zone '$ZONE_NAME'." "$STATUS"
          fi
          EXISTING_CONTENT=$(jq -r '.result[0].content // empty' "$RESPONSE_FILE")
          if [ -n "$EXISTING_CONTENT" ]; then
            echo "CNAME already exists: $DOMAIN -> $EXISTING_CONTENT. Skipping."
            if [ "$EXISTING_CONTENT" != "$TARGET" ]; then
              echo "::warning::Existing CNAME points to '$EXISTING_CONTENT', expected '$TARGET'. Fix manually if the domain doesn't resolve."
            fi
          else
            echo "Creating CNAME: $DOMAIN -> $TARGET (proxied through Cloudflare)..."
            STATUS=$(api POST "/zones/$ZONE_ID/dns_records" \
              "{\"type\":\"CNAME\",\"name\":\"$DOMAIN\",\"content\":\"$TARGET\",\"proxied\":true}")
            if [ "$STATUS" != "200" ] || [ "$(jq -r '.success // false' "$RESPONSE_FILE")" != "true" ]; then
              die "Failed to create CNAME record. The token likely lacks 'Zone:DNS:Edit' for $ZONE_NAME." "$STATUS"
            fi
            echo "CNAME created. DNS propagates within seconds; SSL provisioning completes in ~1 minute."
          fi
          echo "::endgroup::"

          echo ""
          echo "Bootstrap complete."
          echo "  - Pages project:  $PROJECT (production_branch=$PRODUCTION_BRANCH)"
          echo "  - Custom domain:  https://$DOMAIN"
          echo "  - CNAME target:   $TARGET"
          echo ""
          echo "If $DOMAIN does not load within a minute, check the Custom Domains"
          echo "tab of the $PROJECT Pages project in the Cloudflare dashboard for"
          echo "SSL/verification status."
