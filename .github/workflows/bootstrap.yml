name: Bootstrap Cloudflare

# One-time setup workflow. Idempotent â€” re-running is a no-op once both
# the Pages project and the custom domain exist. Safe to delete this file
# after a successful run, but harmless to leave in place.
#
# What it does:
#   1. Creates the `joust` Cloudflare Pages project with main as the
#      production branch (if it doesn't already exist).
#   2. Attaches joust.ninja-cactus.com as a custom domain on that project
#      (if not already attached).
#   3. Creates the CNAME record joust.ninja-cactus.com -> joust.pages.dev
#      in the ninja-cactus.com zone. This step is required: only the
#      Cloudflare dashboard's add-domain flow creates DNS automatically;
#      the API endpoint used in step 2 does not.
#   4. Ensures the account has a workers.dev subdomain. Without one,
#      `wrangler deploy` of the party worker fails with API error 10063.
#      A fresh Cloudflare account does not get this automatically â€” it's
#      normally created on first visit to the Workers dashboard, or here
#      via the API.
#
# Required API token scopes (CLOUDFLARE_API_KEY):
#   - Account â†’ Cloudflare Pages â†’ Edit
#   - Account â†’ Account Settings â†’ Read
#   - Account â†’ Workers Scripts â†’ Edit (for the workers.dev subdomain)
#   - Zone â†’ DNS â†’ Edit (for ninja-cactus.com)
# If any is missing, the workflow will fail with a clear error.

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Create Pages project and attach custom domain
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT: joust
          DOMAIN: joust.ninja-cactus.com
          PRODUCTION_BRANCH: main
          # Globally unique. Falls back to ninja-cactus-<accountid-prefix>
          # if the preferred name is taken by another Cloudflare account.
          WORKERS_SUBDOMAIN: ninja-cactus
          WORKER_NAME: joust-party
        run: |
          set -eo pipefail

          # Sanity-check that the org secrets reached this workflow.
          # An empty value here usually means the repo isn't included in
          # the organisation secret's repository access list.
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::CLOUDFLARE_API_KEY secret is empty in this workflow. Check the org secret's repository access policy and confirm this repo is allowed."
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID secret is empty in this workflow. Check the org secret's repository access policy and confirm this repo is allowed."
            exit 1
          fi

          # api METHOD PATH [JSON_BODY]
          # Prints the HTTP status code on stdout (so callers can capture
          # it with $(api ...)). Writes the response body to RESPONSE_FILE,
          # which the caller reads via `cat`. Two channels because a
          # function called as $(api ...) runs in a subshell and can't
          # mutate the parent's variables â€” hence the file for the body.
          RESPONSE_FILE=$(mktemp)
          trap 'rm -f "$RESPONSE_FILE"' EXIT

          api() {
            local method=$1 path=$2 data=${3:-}
            if [ -n "$data" ]; then
              curl -sS -o "$RESPONSE_FILE" -w '%{http_code}' \
                -X "$method" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "$data" \
                "https://api.cloudflare.com/client/v4$path"
            else
              curl -sS -o "$RESPONSE_FILE" -w '%{http_code}' \
                -X "$method" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                "https://api.cloudflare.com/client/v4$path"
            fi
          }

          die() {
            local context=$1 status=$2
            echo "::error::$context (HTTP $status)"
            echo "--- Cloudflare response ---"
            jq . "$RESPONSE_FILE" 2>/dev/null || cat "$RESPONSE_FILE"
            echo "---------------------------"
            exit 1
          }

          echo "::group::Verify API token"
          STATUS=$(api GET /user/tokens/verify)
          if [ "$STATUS" != "200" ] || [ "$(jq -r '.result.status // empty' "$RESPONSE_FILE")" != "active" ]; then
            die "API token verification failed â€” token is missing, invalid, or lacks the minimum scopes." "$STATUS"
          fi
          echo "Token is active."
          echo "::endgroup::"

          echo "::group::Step 1 â€” Pages project ($PROJECT)"
          STATUS=$(api GET "/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PROJECT")
          case "$STATUS" in
            200)
              echo "Project '$PROJECT' already exists. Skipping creation."
              ;;
            404)
              echo "Project does not exist. Creating..."
              STATUS=$(api POST "/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects" \
                "{\"name\":\"$PROJECT\",\"production_branch\":\"$PRODUCTION_BRANCH\"}")
              if [ "$STATUS" != "200" ] || [ "$(jq -r '.success // false' "$RESPONSE_FILE")" != "true" ]; then
                die "Failed to create Pages project '$PROJECT'. The token likely lacks the 'Cloudflare Pages: Edit' scope." "$STATUS"
              fi
              echo "Created project '$PROJECT' with production_branch=$PRODUCTION_BRANCH."
              # Re-fetch to capture the assigned subdomain.
              STATUS=$(api GET "/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PROJECT")
              ;;
            *)
              die "Unexpected status when checking project '$PROJECT'." "$STATUS"
              ;;
          esac

          # Ensure production_branch is correct. wrangler-action auto-creates
          # projects with production_branch="production" when --project-name
          # points at a non-existent project, which silently lands every
          # --branch=main deploy in a preview slot. PATCH if wrong so the
          # next push to main goes to the production slot.
          CURRENT_BRANCH=$(jq -r '.result.production_branch // empty' "$RESPONSE_FILE")
          if [ "$CURRENT_BRANCH" != "$PRODUCTION_BRANCH" ]; then
            echo "production_branch is '$CURRENT_BRANCH', expected '$PRODUCTION_BRANCH'. Updating..."
            STATUS=$(api PATCH "/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PROJECT" \
              "{\"production_branch\":\"$PRODUCTION_BRANCH\"}")
            if [ "$STATUS" != "200" ] || [ "$(jq -r '.success // false' "$RESPONSE_FILE")" != "true" ]; then
              die "Failed to update production_branch on project '$PROJECT'." "$STATUS"
            fi
            CURRENT_BRANCH=$PRODUCTION_BRANCH
            PRODUCTION_BRANCH_FIXED=1
            echo "production_branch updated to '$PRODUCTION_BRANCH'."
          else
            PRODUCTION_BRANCH_FIXED=0
            echo "production_branch is correctly set to '$CURRENT_BRANCH'."
          fi

          # Cloudflare reserves short/common .pages.dev names, so our
          # project's actual subdomain might be "joust-abc", not "joust".
          # Always use whatever the API tells us â€” never hardcode.
          PROJECT_SUBDOMAIN=$(jq -r '.result.subdomain // empty' "$RESPONSE_FILE")
          if [ -z "$PROJECT_SUBDOMAIN" ]; then
            die "Project response did not include a .subdomain field. Cannot determine the CNAME target." "$STATUS"
          fi
          CANONICAL_URL=$(jq -r '.result.canonical_deployment.url // empty' "$RESPONSE_FILE")
          LATEST_URL=$(jq -r '.result.latest_deployment.url // empty' "$RESPONSE_FILE")
          echo "  Project hostname     : https://$PROJECT_SUBDOMAIN"
          echo "  Canonical deployment : ${CANONICAL_URL:-(none â€” production slot empty)}"
          echo "  Latest deployment    : ${LATEST_URL:-(none)}"
          echo "::endgroup::"

          echo "::group::Step 2 â€” Custom domain ($DOMAIN)"
          STATUS=$(api GET "/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PROJECT/domains")
          if [ "$STATUS" != "200" ]; then
            die "Failed to list domains for project '$PROJECT'." "$STATUS"
          fi

          if jq -e --arg d "$DOMAIN" '.result[] | select(.name == $d)' "$RESPONSE_FILE" >/dev/null; then
            echo "Custom domain '$DOMAIN' already attached. Skipping."
          else
            echo "Attaching '$DOMAIN'..."
            STATUS=$(api POST "/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PROJECT/domains" \
              "{\"name\":\"$DOMAIN\"}")
            if [ "$STATUS" != "200" ] || [ "$(jq -r '.success // false' "$RESPONSE_FILE")" != "true" ]; then
              die "Failed to attach custom domain '$DOMAIN' to project '$PROJECT'." "$STATUS"
            fi
            echo "Attached '$DOMAIN' to Pages project. DNS still needed (next step)."
          fi
          echo "::endgroup::"

          echo "::group::Step 3 â€” DNS record ($DOMAIN -> $PROJECT_SUBDOMAIN)"
          # Derive the zone name from the domain. $DOMAIN is a single
          # subdomain of the zone (joust.ninja-cactus.com -> ninja-cactus.com).
          ZONE_NAME=${DOMAIN#*.}
          TARGET="$PROJECT_SUBDOMAIN"

          STATUS=$(api GET "/zones?name=$ZONE_NAME")
          if [ "$STATUS" != "200" ]; then
            die "Failed to list zones." "$STATUS"
          fi
          ZONE_ID=$(jq -r '.result[0].id // empty' "$RESPONSE_FILE")
          if [ -z "$ZONE_ID" ]; then
            die "Zone '$ZONE_NAME' not found in this Cloudflare account, or the token lacks 'Zone:Read' for it." "$STATUS"
          fi
          echo "Found zone '$ZONE_NAME' (id=$ZONE_ID)."

          STATUS=$(api GET "/zones/$ZONE_ID/dns_records?type=CNAME&name=$DOMAIN")
          if [ "$STATUS" != "200" ]; then
            die "Failed to list DNS records for zone '$ZONE_NAME'." "$STATUS"
          fi
          EXISTING_ID=$(jq -r '.result[0].id // empty' "$RESPONSE_FILE")
          EXISTING_CONTENT=$(jq -r '.result[0].content // empty' "$RESPONSE_FILE")

          if [ -z "$EXISTING_ID" ]; then
            echo "Creating CNAME: $DOMAIN -> $TARGET (proxied through Cloudflare)..."
            STATUS=$(api POST "/zones/$ZONE_ID/dns_records" \
              "{\"type\":\"CNAME\",\"name\":\"$DOMAIN\",\"content\":\"$TARGET\",\"proxied\":true}")
            if [ "$STATUS" != "200" ] || [ "$(jq -r '.success // false' "$RESPONSE_FILE")" != "true" ]; then
              die "Failed to create CNAME record. The token likely lacks 'Zone:DNS:Edit' for $ZONE_NAME." "$STATUS"
            fi
            echo "CNAME created."
          elif [ "$EXISTING_CONTENT" = "$TARGET" ]; then
            echo "CNAME already correct: $DOMAIN -> $EXISTING_CONTENT. Skipping."
          else
            echo "Existing CNAME points to '$EXISTING_CONTENT', but project subdomain is '$TARGET'. Updating..."
            STATUS=$(api PUT "/zones/$ZONE_ID/dns_records/$EXISTING_ID" \
              "{\"type\":\"CNAME\",\"name\":\"$DOMAIN\",\"content\":\"$TARGET\",\"proxied\":true}")
            if [ "$STATUS" != "200" ] || [ "$(jq -r '.success // false' "$RESPONSE_FILE")" != "true" ]; then
              die "Failed to update CNAME record." "$STATUS"
            fi
            echo "CNAME updated: $DOMAIN -> $TARGET."
          fi
          echo "::endgroup::"

          echo "::group::Step 4 â€” Workers subdomain"
          # A Cloudflare account has at most one workers.dev subdomain;
          # every worker on the account is served from it as
          # <worker>.<subdomain>.workers.dev. A fresh account has none, so
          # `wrangler deploy` fails with API error 10063 until one exists.
          STATUS=$(api GET "/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain")
          case "$STATUS" in
            200)
              EXISTING_WS=$(jq -r '.result.subdomain // empty' "$RESPONSE_FILE")
              ;;
            404)
              EXISTING_WS=""
              ;;
            *)
              die "Unexpected status when checking workers.dev subdomain. The token likely lacks 'Workers Scripts: Edit'." "$STATUS"
              ;;
          esac

          if [ -n "$EXISTING_WS" ]; then
            echo "Account already has workers.dev subdomain: '$EXISTING_WS'. Skipping."
            ASSIGNED_WS=$EXISTING_WS
          else
            # First try the preferred name. If it's globally taken,
            # fall back to a deterministic suffix derived from the
            # account ID so re-runs land on the same name.
            CANDIDATES=(
              "$WORKERS_SUBDOMAIN"
              "$WORKERS_SUBDOMAIN-${CLOUDFLARE_ACCOUNT_ID:0:8}"
            )
            ASSIGNED_WS=""
            for name in "${CANDIDATES[@]}"; do
              echo "Attempting to claim workers.dev subdomain: '$name'..."
              STATUS=$(api PUT "/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
                "{\"subdomain\":\"$name\"}")
              if [ "$STATUS" = "200" ] && [ "$(jq -r '.success // false' "$RESPONSE_FILE")" = "true" ]; then
                ASSIGNED_WS=$(jq -r '.result.subdomain // empty' "$RESPONSE_FILE")
                ASSIGNED_WS=${ASSIGNED_WS:-$name}
                echo "Claimed '$ASSIGNED_WS'."
                break
              fi
              ERR_CODE=$(jq -r '.errors[0].code // empty' "$RESPONSE_FILE")
              ERR_MSG=$(jq -r '.errors[0].message // empty' "$RESPONSE_FILE")
              # 10073 = subdomain already taken by another account.
              if [ "$ERR_CODE" = "10073" ] || echo "$ERR_MSG" | grep -qi "already"; then
                echo "  '$name' is taken globally. Trying next candidate..."
                continue
              fi
              die "Failed to set workers.dev subdomain to '$name'." "$STATUS"
            done

            if [ -z "$ASSIGNED_WS" ]; then
              die "All candidate workers.dev subdomains were taken. Set WORKERS_SUBDOMAIN to a unique value and re-run." "n/a"
            fi
          fi

          WORKER_URL="$WORKER_NAME.$ASSIGNED_WS.workers.dev"
          echo "Party worker will deploy to: https://$WORKER_URL"
          echo "::endgroup::"

          echo ""
          echo "Bootstrap complete."
          echo "  - Pages project:    $PROJECT (production_branch=$CURRENT_BRANCH)"
          echo "  - Project hostname: https://$PROJECT_SUBDOMAIN"
          echo "  - Custom domain:    https://$DOMAIN"
          echo "  - CNAME target:     $TARGET (proxied)"
          echo "  - Workers subdomain: $ASSIGNED_WS.workers.dev"
          echo "  - Party worker URL:  https://$WORKER_URL"
          echo ""
          echo "The deploy workflows derive this URL automatically from the"
          echo "workers.dev subdomain â€” no manual repo-variable setup required."
          echo ""
          if [ -z "$CANONICAL_URL" ]; then
            echo "::warning::The production slot is empty (no canonical deployment)."
            echo "The custom domain will return 'host_not_allowed' until a production"
            echo "deploy lands. Trigger one with an empty commit to main, e.g.:"
            echo "    git commit --allow-empty -m 'Trigger prod deploy' && git push origin main"
            if [ "$PRODUCTION_BRANCH_FIXED" = "1" ]; then
              echo "(This run also fixed production_branch â€” previous deploys went"
              echo " to a preview slot, which is why prod is empty. The next push"
              echo " to main will now land in production.)"
            fi
          else
            echo "Production is live at $CANONICAL_URL â†’ routed via $DOMAIN."
            echo "If $DOMAIN still does not load, check the Custom Domains tab of"
            echo "the $PROJECT Pages project for SSL/verification status (provisioning"
            echo "can take ~1 min after a CNAME change)."
          fi
