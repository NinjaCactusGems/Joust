name: Deploy preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Resolve party host
        id: party-host
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PARTY_HOST_OVERRIDE: ${{ vars.PARTY_HOST }}
        run: |
          set -eo pipefail
          if [ -n "$PARTY_HOST_OVERRIDE" ]; then
            echo "value=$PARTY_HOST_OVERRIDE" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BODY=$(curl -sS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain")
          SUB=$(echo "$BODY" | jq -r '.result.subdomain // empty')
          if [ -z "$SUB" ]; then
            echo "::warning::No workers.dev subdomain available; preview will fall back to localhost:1999"
            echo "value=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "value=joust-party.${SUB}.workers.dev" >> "$GITHUB_OUTPUT"

      - run: npm run build
        env:
          VITE_PARTY_HOST: ${{ steps.party-host.outputs.value }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=joust --branch=${{ github.head_ref }}

      - name: Comment preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cloudflare-pages-preview
          message: |
            ### Cloudflare Pages preview deployed

            - **URL:** ${{ steps.deploy.outputs.deployment-url }}
            - **Commit:** ${{ github.event.pull_request.head.sha }}
            - **Branch:** `${{ github.head_ref }}`

            The preview is rebuilt on every push to this PR.
