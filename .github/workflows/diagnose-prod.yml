name: Diagnose production

# One-shot diagnostic. Designed to run from the Actions tab on a phone
# when the deployed lobby misbehaves.
#
# Output design:
#   - A markdown table is built up as each check runs and rendered as
#     the run's Job Summary (the big block at the top of the run page).
#     This is what you'll read on a phone — no need to expand logs.
#   - The same summary is posted as a comment on a tracking issue
#     titled "Production diagnostics" (created on first run if missing).
#     Provides searchable history and gives Claude something it can
#     read back via the GitHub API.
#
# Checks never exit non-zero — a failure is data, not a workflow error.
# The job is always green; read the summary to see what's wrong.

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PAGES_URL: https://joust.ninja-cactus.com
      WORKER_NAME: joust-party
      PARTY_HOST: ${{ vars.PARTY_HOST }}
      REPORT: /tmp/report.md
      ROWS: /tmp/rows.md
    steps:
      - name: Initialise report
        run: |
          : > "$REPORT"
          : > "$ROWS"

      - name: 1 · Repo configuration
        if: always()
        run: |
          set +e
          DETAIL=""
          STATUS="PASS"
          if [ -z "${PARTY_HOST}" ]; then
            STATUS="WARN"
            DETAIL="PARTY_HOST repo variable is unset — client falls back to localhost:1999"
          elif echo "${PARTY_HOST}" | grep -q '://'; then
            STATUS="FAIL"
            DETAIL="PARTY_HOST contains a scheme; should be a bare hostname. Got: \`${PARTY_HOST}\`"
          else
            DETAIL="\`${PARTY_HOST}\`"
          fi
          echo "$STATUS - Repo configuration - $DETAIL"
          printf '| %s | Repo configuration | %s |\n' "$STATUS" "$DETAIL" >> "$ROWS"

      - name: 2 · Cloudflare API token verify
        if: always()
        run: |
          set +e
          STATUS="SKIP"
          DETAIL="CLOUDFLARE_API_KEY / CLOUDFLARE_ACCOUNT_ID not set"
          if [ -n "${CLOUDFLARE_API_TOKEN}" ] && [ -n "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            BODY=$(mktemp)
            CODE=$(curl -sS -o "$BODY" -w '%{http_code}' \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              https://api.cloudflare.com/client/v4/user/tokens/verify)
            ACTIVE=$(jq -r '.result.status // empty' "$BODY" 2>/dev/null)
            if [ "$CODE" = "200" ] && [ "$ACTIVE" = "active" ]; then
              STATUS="PASS"; DETAIL="token active"
            else
              STATUS="FAIL"; DETAIL="HTTP $CODE / status=${ACTIVE:-?}"
            fi
          fi
          echo "$STATUS - Cloudflare token - $DETAIL"
          printf '| %s | Cloudflare token | %s |\n' "$STATUS" "$DETAIL" >> "$ROWS"

      - name: 3 · Pages site reachable
        if: always()
        run: |
          set +e
          CODE=$(curl -sS -o /tmp/index.html -w '%{http_code}' --max-time 10 "${PAGES_URL}/")
          BYTES=$(wc -c < /tmp/index.html 2>/dev/null || echo 0)
          if [ "$CODE" = "200" ]; then
            STATUS="PASS"; DETAIL="HTTP 200 (${BYTES} bytes)"
          else
            STATUS="FAIL"; DETAIL="HTTP $CODE"
          fi
          echo "$STATUS - Pages site - $DETAIL"
          printf '| %s | Pages site | %s |\n' "$STATUS" "$DETAIL" >> "$ROWS"

      - name: 4 · Bundle host inlined
        if: always()
        run: |
          set +e
          STATUS="SKIP"; DETAIL="index.html not fetched"
          if [ -s /tmp/index.html ]; then
            ASSET=$(grep -oE 'assets/index-[^"]+\.js' /tmp/index.html | head -1)
            if [ -z "$ASSET" ]; then
              STATUS="WARN"; DETAIL="no JS bundle reference found in index.html"
            else
              curl -sL --max-time 10 "${PAGES_URL}/${ASSET}" -o /tmp/bundle.js
              MATCHES=$(grep -oE '(joust-party[A-Za-z0-9.-]*\.workers\.dev|localhost:1999)' /tmp/bundle.js \
                | sort -u | tr '\n' ',' | sed 's/,$//')
              if [ -z "$MATCHES" ]; then
                STATUS="WARN"; DETAIL="no recognised host string in bundle"
              elif echo ",$MATCHES," | grep -q ',localhost:1999,'; then
                STATUS="FAIL"; DETAIL="bundle still references \`localhost:1999\` — PARTY_HOST wasn't set at build time"
              elif [ -n "${PARTY_HOST}" ] && ! echo ",$MATCHES," | grep -q ",${PARTY_HOST},"; then
                STATUS="FAIL"; DETAIL="bundle host (\`$MATCHES\`) ≠ PARTY_HOST (\`${PARTY_HOST}\`); old build"
              else
                STATUS="PASS"; DETAIL="\`$MATCHES\`"
              fi
            fi
          fi
          echo "$STATUS - Bundle host - $DETAIL"
          printf '| %s | Bundle host | %s |\n' "$STATUS" "$DETAIL" >> "$ROWS"

      - name: 5 · Workers.dev subdomain
        if: always()
        run: |
          set +e
          STATUS="SKIP"; DETAIL="no Cloudflare token"
          if [ -n "${CLOUDFLARE_API_TOKEN}" ]; then
            BODY=$(mktemp)
            CODE=$(curl -sS -o "$BODY" -w '%{http_code}' \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain")
            SUB=$(jq -r '.result.subdomain // empty' "$BODY" 2>/dev/null)
            if [ -z "$SUB" ]; then
              STATUS="FAIL"; DETAIL="no workers.dev subdomain on account (HTTP $CODE)"
            else
              EXPECTED="${WORKER_NAME}.${SUB}.workers.dev"
              if [ -z "${PARTY_HOST}" ]; then
                STATUS="WARN"; DETAIL="expected URL \`$EXPECTED\` — set repo var PARTY_HOST to this"
              elif [ "${PARTY_HOST}" = "$EXPECTED" ]; then
                STATUS="PASS"; DETAIL="\`$EXPECTED\`"
              else
                STATUS="WARN"; DETAIL="PARTY_HOST (\`${PARTY_HOST}\`) ≠ expected (\`$EXPECTED\`)"
              fi
            fi
          fi
          echo "$STATUS - Workers subdomain - $DETAIL"
          printf '| %s | Workers subdomain | %s |\n' "$STATUS" "$DETAIL" >> "$ROWS"

      - name: 6 · Worker exists
        if: always()
        run: |
          set +e
          STATUS="SKIP"; DETAIL="no Cloudflare token"
          if [ -n "${CLOUDFLARE_API_TOKEN}" ]; then
            BODY=$(mktemp)
            CODE=$(curl -sS -o "$BODY" -w '%{http_code}' \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/services/${WORKER_NAME}")
            if [ "$CODE" = "200" ]; then
              MODIFIED=$(jq -r '.result.default_environment.script.modified_on // .result.modified_on // empty' "$BODY" 2>/dev/null)
              STATUS="PASS"; DETAIL="last modified ${MODIFIED:-unknown}"
            elif [ "$CODE" = "404" ]; then
              STATUS="FAIL"; DETAIL="worker \`${WORKER_NAME}\` not found in this account"
            else
              STATUS="FAIL"; DETAIL="unexpected HTTP $CODE"
            fi
          fi
          echo "$STATUS - Worker exists - $DETAIL"
          printf '| %s | Worker exists | %s |\n' "$STATUS" "$DETAIL" >> "$ROWS"

      - name: 7 · Latest Pages deployment
        if: always()
        run: |
          set +e
          STATUS="SKIP"; DETAIL="no Cloudflare token"
          if [ -n "${CLOUDFLARE_API_TOKEN}" ]; then
            BODY=$(mktemp)
            CODE=$(curl -sS -o "$BODY" -w '%{http_code}' \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/joust/deployments?per_page=1")
            if [ "$CODE" = "200" ]; then
              ENV=$(jq -r '.result[0].environment // empty' "$BODY")
              CREATED=$(jq -r '.result[0].created_on // empty' "$BODY")
              STAGE=$(jq -r '.result[0].latest_stage.status // empty' "$BODY")
              STATUS="PASS"; DETAIL="${ENV:-?} · ${STAGE:-?} · ${CREATED:-?}"
            else
              STATUS="FAIL"; DETAIL="HTTP $CODE"
            fi
          fi
          echo "$STATUS - Latest Pages deployment - $DETAIL"
          printf '| %s | Latest Pages deploy | %s |\n' "$STATUS" "$DETAIL" >> "$ROWS"

      - name: 8 · WS upgrade · allowed Origin
        if: always()
        run: |
          set +e
          STATUS="SKIP"; DETAIL="PARTY_HOST not set"
          if [ -n "${PARTY_HOST}" ]; then
            OUT=$(curl -sS --http1.1 --include --max-time 6 \
              -H "Connection: Upgrade" -H "Upgrade: websocket" \
              -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" \
              -H "Sec-WebSocket-Version: 13" \
              -H "Origin: ${PAGES_URL}" \
              "https://${PARTY_HOST}/parties/main/diag-${GITHUB_RUN_ID}" 2>&1)
            CODE=$(printf '%s\n' "$OUT" | grep -m1 -oE 'HTTP/1\.1 [0-9]+' | awk '{print $2}')
            case "$CODE" in
              101) STATUS="PASS"; DETAIL="HTTP 101 — upgrade accepted from ${PAGES_URL}" ;;
              403) STATUS="FAIL"; DETAIL="HTTP 403 — Origin allowlist may not include ${PAGES_URL}" ;;
              404) STATUS="FAIL"; DETAIL="HTTP 404 — wrong path or wrong worker (check PARTY_HOST)" ;;
              "")  STATUS="FAIL"; DETAIL="no response (DNS/TLS issue or worker offline)" ;;
              *)   STATUS="FAIL"; DETAIL="HTTP $CODE" ;;
            esac
          fi
          echo "$STATUS - WS allowed Origin - $DETAIL"
          printf '| %s | WS allowed Origin | %s |\n' "$STATUS" "$DETAIL" >> "$ROWS"

      - name: 9 · WS upgrade · disallowed Origin
        if: always()
        run: |
          set +e
          STATUS="SKIP"; DETAIL="PARTY_HOST not set"
          if [ -n "${PARTY_HOST}" ]; then
            OUT=$(curl -sS --http1.1 --include --max-time 6 \
              -H "Connection: Upgrade" -H "Upgrade: websocket" \
              -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" \
              -H "Sec-WebSocket-Version: 13" \
              -H "Origin: https://example.com" \
              "https://${PARTY_HOST}/parties/main/diag-${GITHUB_RUN_ID}" 2>&1)
            CODE=$(printf '%s\n' "$OUT" | grep -m1 -oE 'HTTP/1\.1 [0-9]+' | awk '{print $2}')
            if [ "$CODE" = "403" ]; then
              STATUS="PASS"; DETAIL="HTTP 403 — foreign Origin correctly rejected"
            else
              STATUS="FAIL"; DETAIL="expected 403, got HTTP ${CODE:-(none)} — allowlist missing or too permissive"
            fi
          fi
          echo "$STATUS - WS disallowed Origin - $DETAIL"
          printf '| %s | WS disallowed Origin | %s |\n' "$STATUS" "$DETAIL" >> "$ROWS"

      - name: 10 · Live worker logs (~12s window)
        if: always()
        run: |
          set +e
          STATUS="SKIP"; DETAIL="no Cloudflare token"
          TAIL_OUT=""
          if [ -n "${CLOUDFLARE_API_TOKEN}" ]; then
            ( npx --yes wrangler@3 tail "${WORKER_NAME}" --format pretty > /tmp/tail.log 2>&1 ) &
            TAIL_PID=$!
            sleep 3
            curl -sS --http1.1 --include --max-time 3 \
              -H "Connection: Upgrade" -H "Upgrade: websocket" \
              -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" \
              -H "Sec-WebSocket-Version: 13" \
              -H "Origin: ${PAGES_URL}" \
              "https://${PARTY_HOST:-joust-party.invalid}/parties/main/diag-tail-${GITHUB_RUN_ID}" \
              >/dev/null 2>&1 &
            sleep 6
            kill "$TAIL_PID" 2>/dev/null
            wait "$TAIL_PID" 2>/dev/null
            LINES=$(wc -l < /tmp/tail.log 2>/dev/null || echo 0)
            if [ "$LINES" -gt 0 ]; then
              STATUS="PASS"; DETAIL="$LINES log lines captured (see Tail output block below)"
              TAIL_OUT=$(sed -n '1,80p' /tmp/tail.log)
            else
              STATUS="WARN"; DETAIL="tail attached but no log lines arrived"
            fi
          fi
          echo "$STATUS - Live worker logs - $DETAIL"
          printf '| %s | Live worker logs | %s |\n' "$STATUS" "$DETAIL" >> "$ROWS"
          # Save the tail block for the final summary step
          if [ -n "$TAIL_OUT" ]; then
            {
              echo ""
              echo "### Tail output"
              echo ""
              echo '```'
              echo "$TAIL_OUT"
              echo '```'
            } > /tmp/tail-block.md
          fi

      - name: Assemble report
        if: always()
        run: |
          set +e
          {
            echo "# Joust production diagnostics"
            echo ""
            echo "**Run:** [${GITHUB_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) · $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "**Environment:**"
            echo "- Pages URL: \`${PAGES_URL}\`"
            echo "- Worker: \`${WORKER_NAME}\`"
            echo "- PARTY_HOST: \`${PARTY_HOST:-(unset)}\`"
            echo ""
            echo "## Results"
            echo ""
            echo "| Result | Check | Detail |"
            echo "| --- | --- | --- |"
            # Translate the PASS/FAIL/WARN/SKIP strings into emoji for the rendered table
            sed -e 's/| PASS |/| ✅ PASS |/g' \
                -e 's/| FAIL |/| ❌ FAIL |/g' \
                -e 's/| WARN |/| ⚠️ WARN |/g' \
                -e 's/| SKIP |/| ⏭️ SKIP |/g' "$ROWS"
            if [ -f /tmp/tail-block.md ]; then
              cat /tmp/tail-block.md
            fi
          } > "$REPORT"

          # Mobile-readable run page summary
          cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"

          # Echo to logs too
          echo ""
          echo "================ REPORT ================"
          cat "$REPORT"
          echo "========================================"

      - name: Post to tracking issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          if [ ! -s "$REPORT" ]; then
            echo "No report to post."
            exit 0
          fi
          # Find an open issue titled exactly "Production diagnostics".
          # If none, open one. Then comment with the report.
          SEARCH=$(mktemp)
          curl -sS -o "$SEARCH" -G \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            --data-urlencode 'q=repo:'"$GITHUB_REPOSITORY"' is:issue is:open in:title "Production diagnostics"' \
            https://api.github.com/search/issues >/dev/null

          ISSUE=$(jq -r '[.items[]? | select(.title == "Production diagnostics")][0].number // empty' "$SEARCH")
          if [ -z "$ISSUE" ]; then
            echo "Tracking issue not found; creating one."
            CREATE=$(mktemp)
            curl -sS -o "$CREATE" -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/issues" \
              -d '{"title":"Production diagnostics","body":"Automated archive. Each run of the **Diagnose production** workflow appends a comment here."}'
            ISSUE=$(jq -r '.number // empty' "$CREATE")
            if [ -z "$ISSUE" ]; then
              echo "Failed to create tracking issue:"
              cat "$CREATE"
              exit 0
            fi
            echo "Created issue #$ISSUE"
          else
            echo "Posting to existing issue #$ISSUE"
          fi

          PAYLOAD=$(jq -n --rawfile body "$REPORT" '{body: $body}')
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/issues/$ISSUE/comments" \
            -d "$PAYLOAD" | jq -r '.html_url // .message // .'
