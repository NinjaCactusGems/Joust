name: Deploy production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run typecheck:party

      - name: Deploy party worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config party/wrangler.toml

      - name: Resolve party host
        id: party-host
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PARTY_HOST_OVERRIDE: ${{ vars.PARTY_HOST }}
        run: |
          set -eo pipefail
          # The deployed client needs the worker's hostname inlined as
          # VITE_PARTY_HOST at build time. Default: derive it from the
          # account's workers.dev subdomain (queryable via the API),
          # so there's no manual repo-variable step to forget.
          # Escape hatch: an explicit `PARTY_HOST` repo variable wins,
          # for the eventual custom-domain switch.
          if [ -n "$PARTY_HOST_OVERRIDE" ]; then
            echo "Using PARTY_HOST repo variable override: $PARTY_HOST_OVERRIDE"
            echo "value=$PARTY_HOST_OVERRIDE" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BODY=$(curl -sS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain")
          SUB=$(echo "$BODY" | jq -r '.result.subdomain // empty')
          if [ -z "$SUB" ]; then
            echo "::error::Account has no workers.dev subdomain. Run Bootstrap Cloudflare first."
            echo "$BODY"
            exit 1
          fi
          HOST="joust-party.${SUB}.workers.dev"
          echo "Resolved party host: $HOST"
          echo "value=$HOST" >> "$GITHUB_OUTPUT"

      - run: npm run build
        env:
          VITE_PARTY_HOST: ${{ steps.party-host.outputs.value }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=joust --branch=main
